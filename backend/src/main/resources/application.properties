# ===== Virtual Cosmos — Application Configuration =====

spring.application.name=virtual-cosmos
server.port=${SERVER_PORT:8080}

# ===== MongoDB =====
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/virtual_cosmos}

# ===== CORS / WebSocket Origins =====
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# ===== Presence / Stale Session Cleanup =====
app.presence.stale-session-timeout-ms=${APP_PRESENCE_STALE_SESSION_TIMEOUT_MS:60000}
app.presence.stale-session-sweep-ms=${APP_PRESENCE_STALE_SESSION_SWEEP_MS:15000}

# ===== Logging =====
logging.level.com.ryan.virtual_cosmos=DEBUG
logging.level.org.springframework.web.socket=INFO
